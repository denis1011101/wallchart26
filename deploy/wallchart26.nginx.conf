# /etc/nginx/sites-available/wallchart26.com
# Mirrors the existing headscale site: HTTP for ACME + redirect, HTTPS proxy to the app.

# HTTP: ACME challenges + redirect everything to HTTPS apex.
server {
    listen 80;
    listen [::]:80;
    server_name wallchart26.com www.wallchart26.com;

    location /.well-known/acme-challenge/ {
        allow all;
        root /var/www/html;
    }

    location / {
        return 301 https://wallchart26.com$request_uri;
    }
}

# HTTPS: apex -> wallchart26 app on loopback.
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name wallchart26.com;

    # SSL (managed by Certbot)
    ssl_certificate /etc/letsencrypt/live/wallchart26.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wallchart26.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# HTTPS: www -> apex redirect (keeps canonical on the bare domain).
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.wallchart26.com;

    ssl_certificate /etc/letsencrypt/live/wallchart26.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wallchart26.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://wallchart26.com$request_uri;
}
